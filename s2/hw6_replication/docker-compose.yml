version: '3.9'

services:
  pg-master:
    image: postgres:15
    container_name: pg-master
    environment:
      POSTGRES_DB: pvz
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_pass
    ports:
      - "5444:5432"
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=10
      -c max_replication_slots=10
      -c hot_standby=on
    volumes:
      - pg_master_data:/var/lib/postgresql/data
      - ./init/master:/docker-entrypoint-initdb.d

  pg-replica1:
    image: postgres:15
    container_name: pg-replica1
    environment:
      PGPASSWORD: repl_pass
    ports:
      - "5445:5432"
    depends_on:
      - pg-master
    command: postgres
    volumes:
      - pg_replica1_data:/var/lib/postgresql/data

  pg-replica2:
    image: postgres:15
    container_name: pg-replica2
    environment:
      PGPASSWORD: repl_pass
    ports:
      - "5446:5432"
    depends_on:
      - pg-master
    command: postgres
    volumes:
      - pg_replica2_data:/var/lib/postgresql/data


  publisher:
    image: postgres:15
    container_name: pg_publisher
    environment:
      POSTGRES_DB: pvz
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_pass
    ports:
      - "5447:5432"
    command: >
      postgres
      -c wal_level=logical
       -c max_wal_senders=20
       -c max_replication_slots=50
       -c max_logical_replication_workers=30
       -c max_worker_processes=40
       -c max_sync_workers_per_subscription=10
      -c listen_addresses='*'
    volumes:
      - publisher_data:/var/lib/postgresql/data
      - ./init/master:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d pvz" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  subscriber:
    image: postgres:15
    container_name: pg_subscriber
    environment:
      POSTGRES_DB: pvz
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin_pass
    ports:
      - "5448:5432"
    command: >
      postgres
      -c max_wal_senders=20
      -c max_replication_slots=50
      -c max_logical_replication_workers=30
      -c max_worker_processes=40
      -c max_sync_workers_per_subscription=10
      -c listen_addresses='*'
    volumes:
      - subscriber_data:/var/lib/postgresql/data
      - ./init/subscriber:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d pvz" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  pg_master_data:
  pg_replica1_data:
  pg_replica2_data:
  publisher_data:
  subscriber_data: